<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RaceMarket 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--surface:#13161d;--surface2:#1a1e27;--border:#252a36;--text:#e8eaf0;--muted:#6b7280;--yes:#00c278;--no:#ef4444;--accent:#6366f1;--gold:#f59e0b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.mono{font-family:'IBM Plex Mono',monospace;}
.scrollbar-hide::-webkit-scrollbar{display:none;}.scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none;}
.tab-btn{transition:all 0.2s;cursor:pointer;border:none;background:none;}.tab-btn.active{background:white!important;color:black!important;}
.fi{background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 14px;width:100%;outline:none;direction:rtl;font-family:'Heebo',sans-serif;font-size:14px;}.fi:focus{border-color:var(--accent);}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.fu{animation:fu 0.25s ease forwards;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1e27;border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:14px;z-index:400;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;font-weight:bold;}.toast.show{opacity:1;}
.bet-option-btn { background: var(--surface2); border: 1px solid var(--border); padding: 18px; border-radius: 16px; font-weight: 700; text-align: right; transition: 0.2s; width: 100%; margin-bottom: 10px; cursor: pointer; }
.bet-option-btn:hover { border-color: var(--accent); }
.bet-option-btn.selected { border-color: var(--yes); background: rgba(0, 194, 120, 0.1); }
</style>
</head>
<body>

<div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm space-y-4">
    <div class="text-center mb-6">
      <div class="inline-flex items-center gap-2 mb-3">
        <div style="background:linear-gradient(135deg,#6366f1,#8b5cf6);width:44px;height:44px;border-radius:12px;" class="flex items-center justify-center mono font-bold text-white text-lg">R</div>
        <div class="font-black tracking-tighter text-2xl">RACE<span style="color:var(--accent)">MARKET</span></div>
      </div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;" class="p-6 space-y-3">
      <button id="google-btn" class="w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 text-sm" style="background:white;color:#111;">המשך עם Google</button>
    </div>
  </div>
</div>

<div id="app-screen" class="hidden">
<header style="background:rgba(13,15,20,0.97);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);" class="sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
  <div class="flex items-center gap-2">
    <div class="font-black tracking-tighter text-base">RACE<span style="color:var(--accent)">MARKET</span></div>
  </div>
  <div class="flex items-center gap-3">
    <div class="text-right">
      <div id="hdr-cash" class="mono font-bold text-sm">₪1,000</div>
    </div>
    <button id="signout-btn" class="text-xs px-2 py-1 rounded-lg" style="background:var(--surface2);border:1px solid var(--border);color:var(--muted);">יציאה</button>
  </div>
</header>

<div class="flex gap-1 px-3 py-3 overflow-x-auto scrollbar-hide" style="border-bottom:1px solid var(--border);">
  <button onclick="showTab('markets')" id="tab-btn-markets" class="tab-btn active rounded-full px-4 py-1.5 text-sm font-bold whitespace-nowrap" style="background:var(--surface2);color:var(--muted);">שווקים</button>
  <button onclick="showTab('chat')" id="tab-btn-chat" class="tab-btn hidden rounded-full px-4 py-1.5 text-sm font-bold whitespace-nowrap" style="background:var(--surface2);color:var(--muted);">💬 לייב</button>
  <button onclick="showTab('ticket')" id="tab-btn-ticket" class="tab-btn rounded-full px-4 py-1.5 text-sm font-bold whitespace-nowrap" style="background:var(--surface2);color:var(--muted);">🎟️ כרטיס</button>
  <button onclick="showTab('admin')" id="tab-btn-admin" class="tab-btn hidden rounded-full px-4 py-1.5 text-sm font-bold whitespace-nowrap" style="background:var(--surface2);color:var(--muted);">⚙️</button>
</div>

<main class="max-w-2xl mx-auto px-4 py-4 pb-28">

<div id="tab-markets" class="space-y-3">
  <div id="markets-list"></div>
</div>

<div id="tab-bet-focus" class="hidden space-y-6 fu">
  <button onclick="showTab('markets')" class="text-sm font-bold mb-4" style="color:var(--accent)">← חזרה לכל השאלות</button>
  <div id="focus-content"></div>
</div>

<div id="tab-chat" class="hidden space-y-4">
    <div class="p-4 rounded-xl text-center font-bold" style="background:var(--accent);">צ'אט הפרק בשידור חי 📺</div>
    <div id="chat-messages" class="h-96 overflow-y-auto p-4 space-y-3 rounded-xl" style="background:var(--surface2);"></div>
    <div class="flex gap-2">
        <input id="chat-input" class="fi" placeholder="כתוב משהו...">
        <button onclick="sendChatMessage()" class="px-4 py-2 rounded-xl font-bold" style="background:var(--accent);">שלח</button>
    </div>
</div>

<div id="tab-ticket" class="hidden space-y-4">
  <div class="rounded-2xl p-5 text-center space-y-2" style="background:linear-gradient(135deg,#1a1500,#2d2000);border:2px solid var(--gold);">
    <div class="text-3xl">🎟️</div>
    <div class="font-black text-xl" style="color:var(--gold);">כרטיס הדחה</div>
    <p class="text-sm" style="color:#d4a800;">נחש את סדר ההדחות הנכון — וזכה ב־₪69,000!</p>
    <div class="mono font-black text-2xl mt-2" style="color:var(--yes);">מחיר: ₪200</div>
  </div>
</div>

<div id="tab-admin" class="hidden space-y-5">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;" class="p-5 space-y-4">
    <div class="font-black">➕ צור הימור/שאלה חדשה</div>
    <input id="nm-title" class="fi" type="text" placeholder="כותרת השאלה...">
    <textarea id="nm-opts" class="fi" rows="3" placeholder="אופציות (כל אחת בשורה חדשה)"></textarea>
    <input id="nm-deadline" class="fi" type="datetime-local">
    <button onclick="createMarket()" class="w-full py-3 rounded-xl font-black" style="background:var(--yes);color:black;">🚀 פרסם שאלה</button>
  </div>

  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;" class="p-5 space-y-3">
    <div class="font-black">🛠️ ניהול מערכת</div>
    <div class="flex gap-2">
        <button onclick="updateChatToggle(true)" class="flex-1 py-2 rounded-lg font-bold" style="background:var(--accent);">פתח צ'אט</button>
        <button onclick="updateChatToggle(false)" class="flex-1 py-2 rounded-lg font-bold" style="background:var(--surface2);">סגור צ'אט</button>
    </div>
    <button onclick="resetSystem()" class="w-full py-2 rounded-lg font-bold text-xs" style="color:var(--no); border:1px solid var(--no);">⚠️ איפוס כסף ושאלות</button>
  </div>

  <div id="admin-markets-list" class="space-y-3"></div>
</div>

</main>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, addDoc, getDocs, collection, query, orderBy, onSnapshot, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDCXw1r1TaW7duObCkur3o7ZSVsrl4zAuI",
    authDomain: "tictactoe-dcabc.firebaseapp.com",
    projectId: "tictactoe-dcabc",
    storageBucket: "tictactoe-dcabc.firebasestorage.app",
    messagingSenderId: "527570831544",
    appId: "1:527570831544:web:2dcdcafaed3a21a2184c4d"
};

const FB=initializeApp(firebaseConfig);
const auth=getAuth(FB), db=getFirestore(FB), provider=new GoogleAuthProvider();

const ADMIN_EMAIL = "gosha.zisel@gmail.com";
const START_CASH = 1000;
const TICKET_PRICE = 200;

let me=null, U={cash:START_CASH}, MKTs=[], selectedOptIdx=null;

// --- AUTH ---
onAuthStateChanged(auth, async (u)=>{
  if(u){
    me=u;
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.remove('hidden');
    if(u.email === ADMIN_EMAIL) document.getElementById('tab-btn-admin').classList.remove('hidden');
    
    const uRef = doc(db, "users", u.uid);
    const snap = await getDoc(uRef);
    if(!snap.exists()) await setDoc(uRef, {name:u.displayName, cash:START_CASH, email:u.email});
    
    onSnapshot(uRef, d => {
        U = d.data();
        document.getElementById('hdr-cash').innerText = `₪${U.cash.toLocaleString()}`;
    });
    
    listenMarkets();
    listenChatToggle();
    listenChatMessages();
  } else {
    document.getElementById('auth-screen').classList.remove('hidden');
    document.getElementById('app-screen').classList.add('hidden');
  }
});

document.getElementById('google-btn').onclick=()=>signInWithPopup(auth,provider);
document.getElementById('signout-btn').onclick=()=>signOut(auth);

// --- TABS ---
window.showTab = (id) => {
    document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
    document.getElementById(`tab-${id}`).classList.remove('hidden');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-btn-${id}`)?.classList.add('active');
};

// --- MARKETS ---
function listenMarkets() {
    onSnapshot(collection(db, "markets"), (snap)=>{
        MKTs = snap.docs.map(d => ({id:d.id, ...d.data()}));
        renderMarkets();
        renderAdminMarkets();
    });
}

function renderMarkets() {
    const list = document.getElementById('markets-list');
    list.innerHTML = MKTs.map(m => `
        <div onclick="openMarketFocus('${m.id}')" style="background:var(--surface); border:1px solid var(--border);" class="p-5 rounded-2xl cursor-pointer hover:border-indigo-500 transition mb-3">
            <h3 class="font-bold text-lg">${m.title}</h3>
            <div class="text-xs mt-1" style="color:var(--muted)">סיום: ${new Date(m.deadline).toLocaleString()}</div>
        </div>
    `).join('');
}

window.openMarketFocus = (id) => {
    const m = MKTs.find(x => x.id === id);
    const container = document.getElementById('focus-content');
    const isExpired = new Date() > new Date(m.deadline);
    selectedOptIdx = null;

    container.innerHTML = `
        <div class="mb-6">
            <h1 class="text-3xl font-black mb-2">${m.title}</h1>
            <p style="color:var(--muted)">בחר את התשובה הנכונה והזן סכום להימור</p>
            ${isExpired ? '<div class="mt-2 font-bold" style="color:var(--no)">🚫 ההימורים נסגרו לזמן זה</div>' : ''}
        </div>
        <div class="space-y-3">
            ${m.options.map((opt, i) => `
                <div onclick="selectBetOpt(${i})" id="opt-${i}" class="bet-option-btn">
                    ${opt}
                </div>
            `).join('')}
        </div>
        <div class="mt-8 p-6 rounded-2xl" style="background:var(--surface2);">
            <label class="block text-sm mb-2" style="color:var(--muted)">סכום הימור (₪)</label>
            <input id="bet-amt" type="number" class="fi text-lg mono" value="50" min="1">
            <button onclick="executeBet('${m.id}')" class="w-full mt-4 py-4 rounded-xl font-black text-black ${isExpired ? 'opacity-50 pointer-events-none' : ''}" style="background:var(--yes);">אשר הימור 🚀</button>
        </div>
    `;
    showTab('bet-focus');
};

window.selectBetOpt = (idx) => {
    selectedOptIdx = idx;
    document.querySelectorAll('.bet-option-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById(`opt-${idx}`).classList.add('selected');
};

window.executeBet = async (mId) => {
    const amt = parseInt(document.getElementById('bet-amt').value);
    if(selectedOptIdx === null) return toast("בחר אופציה קודם!");
    if(amt > U.cash) return toast("אין לך מספיק מזומן!");
    
    await addDoc(collection(db, "bets"), {
        uId: me.uid, uName: me.displayName, mId, optIdx: selectedOptIdx, amt, time: serverTimestamp()
    });
    await updateDoc(doc(db, "users", me.uid), { cash: U.cash - amt });
    toast("הימור בוצע בהצלחה!");
    showTab('markets');
};

// --- ADMIN ---
window.createMarket = async () => {
    const title = document.getElementById('nm-title').value;
    const options = document.getElementById('nm-opts').value.split('\n').filter(x => x.trim());
    const deadline = document.getElementById('nm-deadline').value;
    if(!title || options.length < 2 || !deadline) return alert("מלא את כל השדות");
    await addDoc(collection(db, "markets"), {title, options, deadline, createdAt: serverTimestamp()});
    alert("פורסם!");
    document.getElementById('nm-title').value = '';
    document.getElementById('nm-opts').value = '';
};

function renderAdminMarkets() {
    const list = document.getElementById('admin-markets-list');
    list.innerHTML = `<div class="font-bold text-sm mb-2">ניהול שאלות:</div>` + MKTs.map(m => `
        <div class="p-4 rounded-xl flex justify-between items-center" style="background:var(--surface2); border:1px solid var(--border);">
            <span class="text-sm font-bold">${m.title}</span>
            <div class="flex gap-2">
                <button onclick="editMarketTitle('${m.id}')" class="text-xs text-indigo-400">ערוך</button>
                <button onclick="deleteMarket('${m.id}')" class="text-xs text-red-400">מחק</button>
                <select onchange="resolveMarket('${m.id}', this.value)" class="text-xs bg-black p-1 rounded">
                    <option>סגור הימור...</option>
                    ${m.options.map((o,i)=>`<option value="${i}">${o}</option>`).join('')}
                </select>
            </div>
        </div>
    `).join('');
}

window.deleteMarket = async (id) => { if(confirm("למחוק?")) await deleteDoc(doc(db, "markets", id)); };

window.editMarketTitle = async (id) => {
    const newT = prompt("כותרת חדשה:");
    if(newT) await updateDoc(doc(db, "markets", id), {title: newT});
};

window.resolveMarket = async (id, winnerIdx) => {
    const m = MKTs.find(x => x.id === id);
    alert(`התשובה "${m.options[winnerIdx]}" נקבעה כנכונה! השוק נסגר.`);
    await deleteDoc(doc(db, "markets", id));
};

window.updateChatToggle = async (status) => {
    await setDoc(doc(db, "settings", "global"), {chatEnabled: status}, {merge:true});
};

function listenChatToggle() {
    onSnapshot(doc(db, "settings", "global"), (d) => {
        const chatActive = d.data()?.chatEnabled;
        document.getElementById('tab-btn-chat').classList.toggle('hidden', !chatActive);
    });
}

// --- CHAT ---
window.sendChatMessage = async () => {
    const inp = document.getElementById('chat-input');
    if(!inp.value.trim()) return;
    await addDoc(collection(db, "chat"), {
        user: me.displayName, text: inp.value, time: serverTimestamp()
    });
    inp.value = '';
};

function listenChatMessages() {
    const q = query(collection(db, "chat"), orderBy("time", "desc"));
    onSnapshot(q, (snap) => {
        const box = document.getElementById('chat-messages');
        box.innerHTML = snap.docs.map(d => `
            <div class="p-2 rounded-lg" style="background:rgba(255,255,255,0.05)">
                <div class="text-[10px] font-bold" style="color:var(--accent)">${d.data().user}</div>
                <div class="text-sm">${d.data().text}</div>
            </div>
        `).join('');
    });
}

window.resetSystem = () => { if(confirm("זה ימחק הכל. בצע מחיקה ידנית ב-Firebase Console.")) return; };

function toast(msg){
  const t=document.getElementById('toast'); t.innerText=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

</script>
</body>
</html>
